<section class="calculator">
  <mat-card class="mat-card">
    <mat-card-header>
      <mat-card-title>Altura</mat-card-title>
      <mat-card-subtitle>{{sliderHeight.value}} [cm]

      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-slider [max]="maxHeight()"
        [min]="minHeight()"
        [showTickMarks]="showTickMarks()">
        <input matSliderThumb [value]="defaultHeight()" #sliderHeight/>
      </mat-slider>
    </mat-card-content>
  </mat-card>
  <mat-card class="mat-card">
    <mat-card-header>
      <mat-card-title>Peso</mat-card-title>
      <mat-card-subtitle>{{sliderWeight.value}} [Kg]

      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-slider
        [max]="maxWeight()"
        [min]="minWeight()"
        [showTickMarks]="showTickMarks()">
        <input matSliderThumb [value]="defaultWeight()" #sliderWeight/>
      </mat-slider>
    </mat-card-content>
  </mat-card>
  <button matButton="elevated">
    Calcular IMC
  </button>
  
</section>
